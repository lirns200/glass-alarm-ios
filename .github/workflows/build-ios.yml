name: Build iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show project files
        run: |
          pwd
          find . -name "*.xcodeproj"

      - name: List schemes
        run: |
          xcodebuild -list -project GlassAlarm.xcodeproj

      - name: Build
        run: |
          xcodebuild \
            -project GlassAlarm.xcodeproj \
            -scheme GlassAlarm \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            build
