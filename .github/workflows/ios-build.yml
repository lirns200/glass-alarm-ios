name: iOS Build Diagnostic

on:
  workflow_dispatch:
    inputs:
      build_id:
        required: true
        type: string
      ios_path:
        required: false
        type: string
        default: '.'
      scheme:
        required: false
        type: string
        default: ''
      use_signing:
        required: false
        type: boolean
        default: false
      configuration:
        required: false
        type: string
        default: 'Debug'
      flutter_version:
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build and Capture Log
        run: |
          set -o pipefail
          cd VPN
          
          # Запускаем сборку с захватом полного лога
          xcodebuild build \
            -project Happ.xcodeproj \
            -scheme Happ \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO \
            | tee build_full.log || true
          
          # Ищем ошибку и выводим контекст
          echo "--- START ERROR DIAGNOSTIC ---"
          grep -C 50 "error:" build_full.log || tail -n 200 build_full.log
          echo "--- END ERROR DIAGNOSTIC ---"
          
          # Проверяем наличие артефактов компиляции
          ls -R DerivedData/Build/Products/Debug-iphoneos || echo "No build products found"
          
      - name: Upload Full Log
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: VPN/build_full.log
