name: SecureVPN
options:
  bundleIdPrefix: com.example
targets:
  SecureVPN:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: SecureVPNApp.swift
      - path: ContentView.swift
      - path: HomeView.swift
      - path: Models.swift
      - path: ServerListView.swift
      - path: SettingsView.swift
      - path: VPNManager.swift
    info:
      path: Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.SecureVPN
        PRODUCT_NAME: SecureVPN
        SWIFT_VERSION: 5.0
    dependencies:
      - target: TunnelProvider
  TunnelProvider:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: TunnelProvider/PacketTunnelProvider.swift
    info:
      path: TunnelProvider/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.SecureVPN.TunnelProvider
        PRODUCT_NAME: TunnelProvider
        SWIFT_VERSION: 5.0
